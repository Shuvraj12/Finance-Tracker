spring:
  datasource:
    url: jdbc:h2:mem:finance_tracker_test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

jwt:
  secret: test-only-secret-not-used-outside-junit-do-not-reuse-this-value
  expiration-ms: 3600000
