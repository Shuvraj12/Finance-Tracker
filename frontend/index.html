<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Tracker</title>
    <script>
      // Runs before anything paints. Keep the localStorage key
      // ('finance_tracker_theme') in sync with context/ThemeContext.jsx -
      // this is plain JS, not a module, so it can't import the constant.
      (function () {
        try {
          var stored = localStorage.getItem('finance_tracker_theme');
          var isDark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // localStorage unavailable (private browsing, etc.) - default to light.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
